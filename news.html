<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - החברים של עמית</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <!-- Top Navigation Bar -->
    <header class="top-bar">
        <div class="top-bar-right">
            <button class="hamburger-btn-top" onclick="toggleMenu()">
                <i data-lucide="menu" stroke-width="2.5" width="28" height="28"></i>
            </button>
            <h1 class="page-title">News</h1>
        </div>
        <div class="top-bar-left">
            <img src="images/לוגו עגלה לבן.png" alt="לוגו עגלה">
        </div>
    </header>

    <!-- Side Menu & Overlay -->
    <div class="side-menu-overlay" onclick="toggleMenu()"></div>
    <div class="side-menu">
        <button class="close-menu-btn" onclick="toggleMenu()">
            <i data-lucide="x"></i>
        </button>
        <nav class="menu-nav">
            <a href="index.html">
                <i data-lucide="home"></i>
            </a>
            <a href="about.html">
                <i data-lucide="info"></i> הסיפור של עמית
            </a>
            <a href="coffee.html">
                <i data-lucide="coffee"></i> קפה "החברים של עמית"
            </a>
            <a href="events.html">
                <i data-lucide="calendar"></i> אירועי הנצחה
            </a>
            <a href="news.html">
                <i data-lucide="newspaper"></i> כתבות בעיתונות
            </a>
            <a href="contact.html">
                <i data-lucide="mail"></i> יצירת קשר
            </a>
        </nav>
    </div>

    <div class="container">
        <h2>חדשות ועדכונים</h2>
        <p>דף זה נמצא בבנייה. כאן יפורסמו העדכונים האחרונים.</p>
    </div>

    <script>
        function toggleMenu() {
            document.querySelector('.side-menu').classList.toggle('active');
            document.querySelector('.side-menu-overlay').classList.toggle('active');
        }
        window.onload = () => {
            lucide.createIcons();
        };
    </script>
</body>

</html>
