<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>החברים של עמית</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">

</head>

<body class="home-page">
    <div id="navigation-root"></div>

    <!-- Hello World Redesign -->
    <div class="hello-world-container">
        <div class="memorial-image-container">
            <img src="images/main/עמית פרידמן.jpeg" alt="עמית פרידמן" class="memorial-image">
        </div>
        <div class="memorial-text-container">
            <h1 class="memorial-name">סמ"ר עמית פרידמן ז"ל</h1>
            <div class="memorial-dates" dir="ltr">2005 &ndash; 2024</div>
            <div class="memorial-info">
                לוחם בחטיבת הנח"ל, נפל בקרב ברפיח<br>
                ביום כ"ד באב תשפ"ד (27.8.2024)
            </div>
            <div class="memorial-quote">
                "מעצבן אותי אנשים שמפסידים חוויות<br>בגלל שלא היה להם כח לקום"
            </div>
        </div>

        <!-- Carousel -->
        <div class="carousel-section">
            <div class="carousel-container">
                <img src="images/main/zofim.jpeg" alt="צופים" class="carousel-img active">
                <img src="images/main/birthday.jpeg" alt="יום הולדת" class="carousel-img">
                <img src="images/main/At the party.jpeg" alt="במסיבה" class="carousel-img">
                <img src="images/main/Army smile.jpeg" alt="חיוך צבאי" class="carousel-img">
            </div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script>
        window.onload = () => {
            initNavigation("דף הבית");
            startCarousel();
        };

        function startCarousel() {
            const images = document.querySelectorAll('.carousel-img');
            let currentIndex = 0;

            setInterval(() => {
                images[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % images.length;
                images[currentIndex].classList.add('active');
            }, 4000); // Change image every 4 seconds
        }
    </script>
</body>

</html>
