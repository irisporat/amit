                instructions: "1. לשים חומרי בצק 8 דקות (אין צורך בהתפחה!).\n2. מנוחה 4 דקות.\n3. ממלאים, סוגרים ומורחים ביצה.\n4. אופים ב-200 מעלות (טורבו) כ-10 דקות."
            }
        ];

        // Core App Logic
        function init() {
            renderHome();
            lucide.createIcons();
        }

        function renderHome() {
            const listContainer = document.getElementById('recipe-list-container');
            listContainer.innerHTML = ''; // Clear

            recipes.forEach((recipe, index) => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.onclick = () => showRecipe(index);

                // Construct safe filename for local image
                // Remvoe special chars including Windows invalid chars, quotes, and Hebrew Gersh/Gershayim
                const safeTitle = recipe.title.replace(/[<>:"/\\|?*'\`\u05F3\u05F4]/g, '');
                const safeAuthor = recipe.author.replace(/[<>:"/\\|?*'\`\u05F3\u05F4]/g, '');

                // Paths to try
                const jpgPath = `images/${safeTitle} - ${safeAuthor}.jpg`;
                const pngPath = `images/${safeTitle} - ${safeAuthor}.png`;

                // Placeholder fallback logic
                let fallbackUrl = 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=300&q=80'; // Default Cake
                if (recipe.title.includes('שוקולד')) fallbackUrl = 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=300&q=80';
                if (recipe.title.includes('גבינה')) fallbackUrl = 'https://images.unsplash.com/photo-1533134242443-d4fd215305ad?auto=format&fit=crop&w=300&q=80';
                if (recipe.title.includes('תפוח')) fallbackUrl = 'https://images.unsplash.com/photo-1568571780765-9276ac8b75a2?auto=format&fit=crop&w=300&q=80';
                if (recipe.title.includes('עוגיות')) fallbackUrl = 'https://images.unsplash.com/photo-1499636138143-bd649043ea52?auto=format&fit=crop&w=300&q=80';
                if (recipe.title.includes('סמבוסק')) fallbackUrl = 'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?auto=format&fit=crop&w=300&q=80';
                if (recipe.title.includes('אלפחורס')) fallbackUrl = 'https://images.unsplash.com/photo-1558961363-fa8fdf82db35?auto=format&fit=crop&w=300&q=80';

                card.innerHTML = `
                    <img src="${jpgPath}" 
                         onerror="if(this.src.endsWith('.jpg') || this.src.endsWith('.jpg%22')) { this.src='${pngPath}'; } else { this.onerror=null; this.src='${fallbackUrl}'; }" 
                         alt="${recipe.title}" class="card-img">
                    <div class="card-info">
                        <h3>${recipe.title}</h3>
                        <p>${recipe.author}</p>
                    </div>
                `;
                listContainer.appendChild(card);
            });
            lucide.createIcons();
        }

        function showRecipe(index) {
            const recipe = recipes[index];
            const container = document.getElementById('single-recipe-container');

            // Render the single A4 page
            container.innerHTML = `
                <div class="page recipe-page">
                    <button class="close-btn" onclick="showHome()">
                        <i data-lucide="x"></i>
                    </button>
                    <div class="icons-bg"></div>
                    <div class="recipe-header">
                        <h1 class="recipe-title">${recipe.title}</h1>
                        <div class="recipe-author">נאפה באהבה על ידי: ${recipe.author}</div>
                    </div>
                    <div class="recipe-content">
                        <div class="ingredients-box">
                            <span class="box-title">מצרכים</span>
                            <div>${recipe.ingredients.replace(/\n/g, '<br>')}</div>
                        </div>
                        <div class="instructions-box">
                            <span class="box-title">אופן ההכנה</span>
                            <div>${recipe.instructions.replace(/\n/g, '<br>')}</div>
                        </div>
                    </div>
                </div>
            `;

            // Switch views
            document.getElementById('home-view').classList.remove('active');
            document.getElementById('recipe-view').classList.add('active');
            window.scrollTo(0, 0);

            // Render icons for the new content
            lucide.createIcons();
        }

        function showHome() {
            document.getElementById('recipe-view').classList.remove('active');
            document.getElementById('home-view').classList.add('active');
            window.scrollTo(0, 0);
        }

        window.onload = init;
    </script>
</body>

</html>
