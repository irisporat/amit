        }

        function renderRecipes() {
            const container = document.getElementById('book-container');
            const sortableUI = document.getElementById('sortablePages');

            recipes.forEach((recipe, index) => {
                // Create A4 Page
                const page = document.createElement('div');
                page.className = 'page recipe-page';
                page.id = `recipe-${index}`;
                page.innerHTML = `
                    <div class="page-border"></div>
                    <div class="icons-bg"></div>
                    <div class="recipe-controls" style="position:absolute; top:12mm; left:12mm; z-index:100; display:flex; gap:5px;">
                        <button class="btn btn-outline btn-sm" onclick="toggleHalfPage(${index})" title="שנה גודל (מלא/חצי)">
                            <i data-lucide="ratio"></i>
                        </button>
                    </div>
                    <div class="recipe-header">
                        <h1 class="recipe-title">${recipe.title}</h1>
                        <div class="recipe-author">נאפה באהבה על ידי: ${recipe.author}</div>
                    </div>
                    <div class="recipe-content">
                        <div class="ingredients-box">
                            <span class="box-title">מצרכים</span>
                            <div>${recipe.ingredients.replace(/\n/g, '<br>')}</div>
                        </div>
                        <div class="instructions-box">
                            <span class="box-title">אופן ההכנה</span>
                            <div>${recipe.instructions.trim()}</div>
                        </div>
                    </div>
                    <div class="recipe-image-placeholder" onclick="this.querySelector('input').click()">
                        <div class="img-controls" onclick="event.stopPropagation()">
                            <button class="btn btn-outline btn-sm" onclick="alignImage(this, 'left', ${index})" title="ימין"><i data-lucide="align-right"></i></button>
                            <button class="btn btn-outline btn-sm" onclick="alignImage(this, 'center', ${index})" title="מרכז"><i data-lucide="align-center"></i></button>
                            <button class="btn btn-outline btn-sm" onclick="alignImage(this, 'right', ${index})" title="שמאל"><i data-lucide="align-left"></i></button>
                        </div>
                        <i data-lucide="image"></i>
                        <span>לחצי להוספת תמונה</span>
                        <input type="file" style="display:none" onchange="handleImage(this, ${index})" onclick="event.stopPropagation()">
                    </div>
                `;
                container.appendChild(page);

                // Create Sortable Item
                const item = document.createElement('div');
                item.className = 'btn btn-outline';
                item.style.fontSize = '12px';
                item.innerHTML = `<i data-lucide="grip-vertical"></i> ${recipe.title}`;
                item.dataset.id = `recipe-${index}`;
                sortableUI.appendChild(item);
            });
        }

        function initSortable() {
            Sortable.create(document.getElementById('sortablePages'), {
                animation: 150,
                onEnd: function (evt) {
                    const pages = document.querySelectorAll('.recipe-page');
                    const order = Array.from(evt.from.children).map(el => el.dataset.id);

                    const container = document.getElementById('book-container');
                    order.forEach(id => {
                        const page = document.getElementById(id);
                        container.appendChild(page);
                    });
                }
            });
        }

        function updateFontSize(val) {
            document.querySelectorAll('.ingredients-box, .instructions-box').forEach(box => {
                box.style.fontSize = val + 'pt';
            });
        }

        function updateFontFamily(val) {
            document.querySelectorAll('.ingredients-box, .instructions-box').forEach(box => {
                box.style.fontFamily = val;
            });
        }

        function handleImage(input, index) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const page = document.getElementById(`recipe-${index}`);
                    const placeholder = page.querySelector('.recipe-image-placeholder');

                    // Remove existing image if any to prevent stacking
                    const existingImg = placeholder.querySelector('.uploaded-image');
                    if (existingImg) existingImg.remove();

                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'uploaded-image';
                    // Ensure the image covers everything but keeps input accessible via parent click
                    img.style.cssText = "width:100%; height:100%; object-fit:cover; border-radius:8px; position:absolute; top:0; left:0; z-index:0;";
                    // Hide icon/text by covering, or just append on top? 
                    // Z-index 0 is fine if text is not z-indexed higher. Text is flow content.
                    // Actually, let's make image bg white to cover text
                    img.style.backgroundColor = "white";

                    placeholder.appendChild(img);
                    // Ensure icon/text are hidden or covered.
                    // Let's just create an img that is absolute and z-index 1.
                    img.style.zIndex = "1";
                }
                reader.readAsDataURL(file);
            }
        }



        async function generatePDF() {
            const element = document.getElementById('book-container');
            const opt = {
                margin: 0,
                filename: 'ספר המתכונים - החברים של עמית.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Temporarily hide toolbar and sidebar scrollbars
            document.body.style.overflow = 'hidden';
            html2pdf().set(opt).from(element).save().then(() => {
                document.body.style.overflow = 'auto';
            });
        }

        function alignImage(btn, dir, index) {
            // Stop propagation is handled in HTML, but good to be safe
            // event.stopPropagation();

            const page = document.getElementById(`recipe-${index}`);
            const placeholder = page.querySelector('.recipe-image-placeholder');

            if (dir === 'left') {
                placeholder.style.left = '10mm';
                placeholder.style.transform = 'none';
                placeholder.style.right = 'auto';
            } else if (dir === 'right') {
                placeholder.style.right = '10mm';
                placeholder.style.left = 'auto';
                placeholder.style.transform = 'none';
            } else {
                // center
                placeholder.style.left = '50%';
                placeholder.style.right = 'auto';
                placeholder.style.transform = 'translateX(-50%)';
            }
        }

        function toggleHalfPage(index) {
            const page = document.getElementById(`recipe-${index}`);
            page.classList.toggle('half');
            // Re-render icons since we might have added new ones or changed layout
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>

</html>
