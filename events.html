<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - החברים של עמית</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">

</head>

<body class="soft-dark-page">
    <div id="navigation-root"></div>

    <div class="events-page-wrapper" style="padding-top: 100px;">
        
        <div class="container event-box accordion" onclick="toggleAccordion(this)">
            <div class="event-main-content">
                <h2 class="event-title">ימי זיכרון</h2>
                <div class="accordion-arrow">
                    <i data-lucide="chevron-down"></i>
                </div>
                <img src="images/events/memorial day 2025.jpeg" alt="ימי זיכרון" class="event-image">
            </div>
            <div class="event-accordion-content">
                <div class="accordion-item">יום הזיכרון תשפ"ה</div>
                <div class="accordion-item">יום השנה לזכרו</div>
            </div>
        </div>

        <div class="container event-box">
            <div class="event-main-content">
                <h2 class="event-title">הרצאות</h2>
                <img src="images/events/lecture.jpeg" alt="הרצאות" class="event-image">
            </div>
        </div>

        <div class="container event-box">
            <div class="event-main-content">
                <h2 class="event-title">צופים</h2>
                <img src="images/events/scouts.jpg" alt="צופים" class="event-image">
            </div>
        </div>

        <div class="container event-box">
            <div class="event-main-content">
                <h2 class="event-title">ספורט</h2>
                <img src="images/events/basketball team.jpg" alt="ספורט" class="event-image">
            </div>
        </div>

        <div class="container event-box">
            <div class="event-main-content">
                <h2 class="event-title">אירועים נוספים</h2>
                <!-- No image for now -->
            </div>
        </div>
    </div>

    <script src="navigation.js"></script>
    <script>
        window.onload = () => {
            initNavigation("אירועי הנצחה");
        };

        function toggleAccordion(element) {
            element.classList.toggle('active');
        }
    </script>
</body>

</html>
